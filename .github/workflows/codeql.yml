# CodeQL

name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  init:
    name: Initialize CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up CodeQL
        uses: github/codeql-action/setup@v2
        with:
          language: "javascript"

          # Disable incremental analysis
          disable-incremental-analysis: true

      - name: Build
        run: npm install

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v2
        with:
          build-mode: ${{ matrix.build-mode }}
          
disable-incremental-analysis: true
    
  scan:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    needs: init
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup CodeQL
        uses: github/codeql-action/setup@v2
        with:
          languages: "javascript"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "security"
          output: results.sarif
          upload: true
